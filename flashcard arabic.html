<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>واژه‌نامه — Arabic Flashcards</title>

<script>
  // Apply saved theme before first paint, to avoid a flash of the wrong theme.
  (function () {
    var saved = localStorage.getItem('flashcard-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root[data-theme="dark"] {
    --bg: #101826;
    --bg-elevated: #16223a;
    --bg-card: #17253e;
    --accent: #e0b84f;
    --accent-soft: rgba(224, 184, 79, 0.16);
    --accent-strong: #f0cd6e;
    --text: #f2ead9;
    --text-muted: #a6a0a6;
    --border: rgba(224, 184, 79, 0.18);
    --success: #6fbf8b;
    --success-soft: rgba(111, 191, 139, 0.15);
    --danger: #d97757;
    --danger-soft: rgba(217, 119, 87, 0.15);
    --glow: radial-gradient(circle, rgba(224,184,79,0.22) 0%, rgba(224,184,79,0) 70%);
  }

  :root[data-theme="light"] {
    --bg: #f5efe1;
    --bg-elevated: #ffffff;
    --bg-card: #ffffff;
    --accent: #c4703f;
    --accent-soft: rgba(196, 112, 63, 0.12);
    --accent-strong: #a85a30;
    --text: #1e2a3a;
    --text-muted: #7a7166;
    --border: rgba(30, 42, 58, 0.12);
    --success: #3d8a5f;
    --success-soft: rgba(61, 138, 95, 0.12);
    --danger: #b8492f;
    --danger-soft: rgba(184, 73, 47, 0.12);
    --glow: radial-gradient(circle, rgba(196,112,63,0.18) 0%, rgba(196,112,63,0) 70%);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    transition: background 0.25s ease, color 0.25s ease;
  }

  .arabic { font-family: 'Vazirmatn', 'Noto Naskh Arabic', sans-serif; }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
  }

  input {
    font-family: inherit;
  }

  a { color: var(--accent); }

  /* ---------- Layout shells ---------- */

  #auth-screen, #app-screen {
    min-height: 100vh;
    display: none;
  }
  #auth-screen.visible, #app-screen.visible { display: block; }

  #auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .auth-card {
    width: 100%;
    max-width: 380px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  }

  .auth-brand {
    text-align: center;
    margin-bottom: 28px;
  }
  .auth-brand .glyph {
    font-family: 'Vazirmatn', sans-serif;
    font-size: 40px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .auth-brand .label {
    margin-top: 8px;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .field {
    margin-bottom: 14px;
  }
  .field label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 11px 13px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .btn-primary {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    background: var(--accent);
    color: var(--bg);
    font-weight: 600;
    font-size: 15px;
    margin-top: 6px;
    transition: transform 0.1s ease, filter 0.15s ease;
  }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .auth-switch {
    text-align: center;
    margin-top: 18px;
    font-size: 14px;
    color: var(--text-muted);
  }
  .auth-switch button {
    background: none;
    color: var(--accent);
    font-weight: 600;
    font-size: 14px;
    padding: 0;
  }

  .auth-error {
    background: var(--danger-soft);
    color: var(--danger);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13.5px;
    margin-bottom: 14px;
    display: none;
  }
  .auth-error.visible { display: block; }

  /* ---------- App shell ---------- */

  #app-screen {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 20px 60px;
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }
  .app-header .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }
  .app-header .title .arabic {
    color: var(--text);
    font-size: 20px;
    font-weight: 700;
    margin-right: 8px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .theme-switch {
    position: relative;
    width: 46px;
    height: 26px;
    border-radius: 999px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    cursor: pointer;
  }
  .theme-switch .knob {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    transition: transform 0.25s ease;
  }
  :root[data-theme="light"] .theme-switch .knob { transform: translateX(20px); }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

  .tabs {
    display: flex;
    gap: 6px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1;
    background: transparent;
    color: var(--text-muted);
    padding: 10px 0;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 600;
  }
  .tab-btn.active {
    background: var(--accent);
    color: var(--bg);
  }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ---------- Progress tab ---------- */

  .progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .progress-row .who {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .progress-row .name {
    font-weight: 600;
    font-size: 15px;
  }
  .progress-row .badge {
    font-size: 15px;
  }
  .progress-row .status {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 3px;
  }
  .progress-row .status.studying { color: var(--success); }
  .progress-row .elapsed {
    font-size: 13px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-muted);
  }
  .empty-state .glyph {
    font-size: 32px;
    margin-bottom: 10px;
    opacity: 0.6;
  }

  /* ---------- Study tab ---------- */

  .lesson-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 22px;
  }
  .lesson-pill {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13.5px;
    font-family: 'Vazirmatn', sans-serif;
  }
  .lesson-pill.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .scene {
    position: relative;
    height: 300px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scene::before {
    content: "";
    position: absolute;
    width: 340px;
    height: 340px;
    background: var(--glow);
    pointer-events: none;
  }

  .flip-scene {
    width: 100%;
    max-width: 340px;
    height: 260px;
    perspective: 1200px;
    z-index: 1;
  }
  .flip-card {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.4s cubic-bezier(0.3, 0.1, 0.2, 1);
    transform-style: preserve-3d;
  }
  .flip-card.is-flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.14);
    cursor: pointer;
    text-align: center;
  }
  .face.back { transform: rotateY(180deg); }

  .face .word {
    font-family: 'Vazirmatn', sans-serif;
    font-size: 40px;
    font-weight: 700;
    direction: rtl;
    color: var(--text);
    word-break: break-word;
  }
  .face .meaning {
    font-family: 'Vazirmatn', sans-serif;
    font-size: 24px;
    font-weight: 600;
    direction: rtl;
    color: var(--accent-strong);
    word-break: break-word;
  }
  .face .hint {
    position: absolute;
    bottom: 14px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .card-actions {
    display: flex;
    gap: 12px;
    max-width: 340px;
    margin: 0 auto;
    visibility: hidden;
  }
  .card-actions.visible { visibility: visible; }
  .card-actions button {
    flex: 1;
    padding: 13px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14.5px;
  }
  .btn-correct { background: var(--success-soft); color: var(--success); }
  .btn-incorrect { background: var(--danger-soft); color: var(--danger); }

  .loop-status {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 16px;
  }

  .lesson-complete {
    text-align: center;
    padding: 50px 20px;
  }
  .lesson-complete .glyph { font-size: 40px; margin-bottom: 12px; }
  .lesson-complete h3 { margin: 0 0 8px; }
  .lesson-complete p { color: var(--text-muted); margin: 0 0 20px; }

  #study-loading {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 0;
  }

  @media (max-width: 480px) {
    .face .word { font-size: 32px; }
    .face .meaning { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- ==================== AUTH SCREEN ==================== -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="glyph">درس</div>
      <div class="label">Arabic Vocabulary</div>
    </div>

    <div class="auth-error" id="auth-error"></div>

    <form id="signup-form">
      <div class="field">
        <label for="su-name">Display name</label>
        <input id="su-name" type="text" required autocomplete="name" />
      </div>
      <div class="field">
        <label for="su-email">Email</label>
        <input id="su-email" type="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="su-password">Password</label>
        <input id="su-password" type="password" required minlength="6" autocomplete="new-password" />
        <div style="font-size:12px;color:var(--text-muted);margin-top:5px;">At least 6 characters.</div>
      </div>
      <button type="submit" class="btn-primary" id="su-submit">Create account</button>
    </form>

    <form id="login-form" style="display:none;">
      <div class="field">
        <label for="li-email">Email</label>
        <input id="li-email" type="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="li-password">Password</label>
        <input id="li-password" type="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-primary" id="li-submit">Sign in</button>
    </form>

    <div class="auth-switch">
      <span id="switch-to-login-wrap">Already have an account? <button id="switch-to-login">Sign in</button></span>
      <span id="switch-to-signup-wrap" style="display:none;">Need an account? <button id="switch-to-signup">Sign up</button></span>
    </div>
  </div>
</div>

<!-- ==================== APP SCREEN ==================== -->
<div id="app-screen">
  <div class="app-header">
    <div class="title"><span class="arabic">درس</span>Flashcards</div>
    <div class="header-actions">
      <div class="theme-switch" id="theme-switch" title="Toggle theme"><div class="knob"></div></div>
      <button class="btn-ghost" id="sign-out-btn">Sign out</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="progress">Live Progress</button>
    <button class="tab-btn" data-tab="study">Study</button>
  </div>

  <!-- PROGRESS PANEL -->
  <div class="panel active" id="panel-progress">
    <div id="progress-list"></div>
  </div>

  <!-- STUDY PANEL -->
  <div class="panel" id="panel-study">
    <div id="study-loading">Loading words…</div>

    <div id="study-content" style="display:none;">
      <div class="lesson-pills" id="lesson-pills"></div>

      <div id="study-card-area">
        <div class="scene">
          <div class="flip-scene">
            <div class="flip-card" id="flip-card">
              <div class="face front" id="face-front">
                <div class="word arabic" id="word-front"></div>
                <div class="hint">Tap to reveal meaning</div>
              </div>
              <div class="face back" id="face-back">
                <div class="meaning arabic" id="word-back"></div>
                <div class="hint">Tap to flip back</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card-actions" id="card-actions">
          <button class="btn-incorrect" id="btn-incorrect">Incorrect</button>
          <button class="btn-correct" id="btn-correct">Correct</button>
        </div>

        <div class="loop-status" id="loop-status"></div>
      </div>

      <div class="lesson-complete" id="lesson-complete" style="display:none;">
        <div class="glyph">✦</div>
        <h3>Lesson complete</h3>
        <p>You've gone through every word in this scope.</p>
        <button class="btn-primary" id="restart-lesson-btn" style="max-width:220px;margin:0 auto;">Study again</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ============================================================================
// CONFIG — fill these in with your own Supabase project's values.
// Project Settings → API in the Supabase dashboard.
// ============================================================================
const SUPABASE_URL = 'https://objayssyopmkzhsboulv.supabase.co/rest/v1/';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iamF5c3N5b3Bta3poc2JvdWx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MzY3MzcsImV4cCI6MjA5OTUxMjczN30.PnREI46BURNmQAv1R_HR5m2Lt8SUAjNEtyhOVgcaUE0';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const HEARTBEAT_MS = 20000;      // how often we refresh our own live_status row
const STALE_MS = 60000;          // rows older than this are hidden from Progress tab
const BADGE_MINUTES = 20;        // cumulative minutes to earn the badge

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let currentUser = null;
let displayName = '';

let allWords = [];               // [{id, arabic_word, persian_meaning, lesson}]
let wordsById = new Map();
let lessonsOrder = [];           // unique lesson names, in first-seen order

let wordProgress = new Map();    // word_id -> {correct_streak, in_loop}
let selectedLesson = 'All Lessons';
let loopQueue = [];              // array of word_ids still to review
let currentWordId = null;

let sessionId = null;
let sessionStartedAt = null;
let badgeEarnedThisSession = false;
let heartbeatTimer = null;
let elapsedTickTimer = null;

let progressChannel = null;
let progressRows = [];           // cached rows for the Progress tab

// ---------------------------------------------------------------------------
// Auth screen wiring
// ---------------------------------------------------------------------------
const authScreen = document.getElementById('auth-screen');
const appScreen = document.getElementById('app-screen');
const authError = document.getElementById('auth-error');

function showAuthError(message) {
  authError.textContent = message;
  authError.classList.add('visible');
}
function clearAuthError() {
  authError.classList.remove('visible');
}

document.getElementById('switch-to-login').addEventListener('click', () => {
  document.getElementById('signup-form').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('switch-to-login-wrap').style.display = 'none';
  document.getElementById('switch-to-signup-wrap').style.display = 'inline';
  clearAuthError();
});
document.getElementById('switch-to-signup').addEventListener('click', () => {
  document.getElementById('signup-form').style.display = 'block';
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('switch-to-login-wrap').style.display = 'inline';
  document.getElementById('switch-to-signup-wrap').style.display = 'none';
  clearAuthError();
});

document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearAuthError();
  const btn = document.getElementById('su-submit');
  btn.disabled = true;
  const name = document.getElementById('su-name').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const password = document.getElementById('su-password').value;

  const { error } = await supabase.auth.signUp({
    email, password,
    options: { data: { display_name: name } }
  });

  btn.disabled = false;
  if (error) {
    showAuthError(error.message);
  }
  // onAuthStateChange handles the successful case (may require email
  // confirmation depending on your Supabase Auth settings).
});

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearAuthError();
  const btn = document.getElementById('li-submit');
  btn.disabled = true;
  const email = document.getElementById('li-email').value.trim();
  const password = document.getElementById('li-password').value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  btn.disabled = false;
  if (error) showAuthError(error.message);
});

document.getElementById('sign-out-btn').addEventListener('click', async () => {
  await endSession();
  await supabase.auth.signOut();
});

// ---------------------------------------------------------------------------
// Session bootstrap
// ---------------------------------------------------------------------------
supabase.auth.onAuthStateChange(async (event, session) => {
  if (session && session.user) {
    currentUser = session.user;
    await enterApp();
  } else {
    currentUser = null;
    authScreen.classList.add('visible');
    appScreen.classList.remove('visible');
  }
});

async function enterApp() {
  authScreen.classList.remove('visible');
  appScreen.classList.add('visible');

  const { data: profile } = await supabase
    .from('profiles')
    .select('display_name')
    .eq('id', currentUser.id)
    .single();
  displayName = profile?.display_name || currentUser.email;

  applyTheme(localStorage.getItem('flashcard-theme') || 'dark');

  await loadWords();
  await loadWordProgress();
  renderLessonPills();
  selectLesson('All Lessons');

  startHeartbeat();
  startSession();
  subscribeToProgress();
  await refreshProgress();
}

// ---------------------------------------------------------------------------
// Theme
// ---------------------------------------------------------------------------
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('flashcard-theme', theme);
}
document.getElementById('theme-switch').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

// ---------------------------------------------------------------------------
// Tabs
// ---------------------------------------------------------------------------
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('panel-progress').classList.toggle('active', tab === 'progress');
  document.getElementById('panel-study').classList.toggle('active', tab === 'study');

  // Being on the Study tab counts as "studying"; anywhere else is "idle".
  updateLiveStatus(tab === 'study' ? 'studying' : 'idle');
  if (tab === 'progress') refreshProgress();
}

// ---------------------------------------------------------------------------
// Words + word_progress
// ---------------------------------------------------------------------------
async function loadWords() {
  const { data, error } = await supabase.from('words').select('*').order('id', { ascending: true });
  if (error) { console.error(error); return; }
  allWords = data || [];
  wordsById = new Map(allWords.map(w => [w.id, w]));

  const seen = new Set();
  lessonsOrder = [];
  for (const w of allWords) {
    if (w.lesson && !seen.has(w.lesson)) { seen.add(w.lesson); lessonsOrder.push(w.lesson); }
  }

  document.getElementById('study-loading').style.display = 'none';
  document.getElementById('study-content').style.display = 'block';
}

async function loadWordProgress() {
  const { data, error } = await supabase
    .from('word_progress')
    .select('word_id, correct_streak, in_loop')
    .eq('user_id', currentUser.id);
  if (error) { console.error(error); return; }
  wordProgress = new Map((data || []).map(r => [r.word_id, { correct_streak: r.correct_streak, in_loop: r.in_loop }]));
}

function renderLessonPills() {
  const wrap = document.getElementById('lesson-pills');
  wrap.innerHTML = '';
  const names = ['All Lessons', ...lessonsOrder];
  names.forEach(name => {
    const pill = document.createElement('button');
    pill.className = 'lesson-pill arabic' + (name === selectedLesson ? ' active' : '');
    pill.textContent = name;
    pill.addEventListener('click', () => selectLesson(name));
    wrap.appendChild(pill);
  });
}

async function selectLesson(lessonName) {
  selectedLesson = lessonName;
  renderLessonPills();

  const scopeWords = lessonName === 'All Lessons'
    ? allWords
    : allWords.filter(w => w.lesson === lessonName);
  const scopeIds = scopeWords.map(w => w.id);
  const scopeSet = new Set(scopeIds);

  // Rows that need to be pulled OUT of the loop (they belong to a different scope).
  const toDeactivate = [];
  for (const [wordId, p] of wordProgress.entries()) {
    if (p.in_loop && !scopeSet.has(wordId)) toDeactivate.push(wordId);
  }
  if (toDeactivate.length) {
    await supabase.from('word_progress')
      .update({ in_loop: false, updated_at: new Date().toISOString() })
      .eq('user_id', currentUser.id)
      .in('word_id', toDeactivate);
    toDeactivate.forEach(id => wordProgress.get(id).in_loop = false);
  }

  // Rows that need to be created or reactivated for the new scope.
  const rowsToUpsert = [];
  for (const id of scopeIds) {
    const existing = wordProgress.get(id);
    if (!existing) {
      rowsToUpsert.push({ user_id: currentUser.id, word_id: id, correct_streak: 0, in_loop: true });
    } else if (!existing.in_loop) {
      rowsToUpsert.push({ user_id: currentUser.id, word_id: id, correct_streak: existing.correct_streak, in_loop: true });
    }
  }
  if (rowsToUpsert.length) {
    await supabase.from('word_progress').upsert(rowsToUpsert, { onConflict: 'user_id,word_id' });
    rowsToUpsert.forEach(r => wordProgress.set(r.word_id, { correct_streak: r.correct_streak, in_loop: true }));
  }

  loopQueue = shuffle(scopeIds.filter(id => wordProgress.get(id)?.in_loop));
  drawNextWord();
}

// ---------------------------------------------------------------------------
// Shuffling
// ---------------------------------------------------------------------------
function shuffle(array) {
  const arr = array.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function shuffleAvoidingFront(array, avoidId) {
  const arr = shuffle(array);
  if (arr.length > 1 && arr[0] === avoidId) {
    const swapIdx = 1 + Math.floor(Math.random() * (arr.length - 1));
    [arr[0], arr[swapIdx]] = [arr[swapIdx], arr[0]];
  }
  return arr;
}

// ---------------------------------------------------------------------------
// Card rendering + flip
// ---------------------------------------------------------------------------
const flipCard = document.getElementById('flip-card');
const wordFrontEl = document.getElementById('word-front');
const wordBackEl = document.getElementById('word-back');
const cardActions = document.getElementById('card-actions');
const studyCardArea = document.getElementById('study-card-area');
const lessonCompleteEl = document.getElementById('lesson-complete');
const loopStatusEl = document.getElementById('loop-status');

function drawNextWord() {
  if (loopQueue.length === 0) {
    currentWordId = null;
    studyCardArea.style.display = 'none';
    lessonCompleteEl.style.display = 'block';
    updateLiveStatus('studying', null);
    return;
  }
  studyCardArea.style.display = 'block';
  lessonCompleteEl.style.display = 'none';

  currentWordId = loopQueue.shift();
  const word = wordsById.get(currentWordId);
  wordFrontEl.textContent = word.arabic_word;
  wordBackEl.textContent = word.persian_meaning;
  cardActions.classList.remove('visible');
  loopStatusEl.textContent = `${loopQueue.length} word${loopQueue.length === 1 ? '' : 's'} left in this loop`;

  updateLiveStatus('studying', currentWordId);
}

flipCard.addEventListener('click', (e) => {
  if (e.target.closest('.card-actions')) return;
  const flipped = flipCard.classList.toggle('is-flipped');
  cardActions.classList.toggle('visible', flipped);
});

document.getElementById('btn-correct').addEventListener('click', (e) => {
  e.stopPropagation();
  advanceCard(async () => {
    await supabase.from('word_progress')
      .update({
        in_loop: false,
        correct_streak: (wordProgress.get(currentWordId)?.correct_streak || 0) + 1,
        updated_at: new Date().toISOString()
      })
      .eq('user_id', currentUser.id)
      .eq('word_id', currentWordId);
    wordProgress.set(currentWordId, { correct_streak: (wordProgress.get(currentWordId)?.correct_streak || 0) + 1, in_loop: false });
    drawNextWord();
  });
});

document.getElementById('btn-incorrect').addEventListener('click', (e) => {
  e.stopPropagation();
  advanceCard(() => {
    const missedId = currentWordId;
    loopQueue.push(missedId);
    loopQueue = shuffleAvoidingFront(loopQueue, missedId);
    drawNextWord();
  });
});

// Unmount/reset the flip state fully before rendering the next word, so the
// new word's meaning never flashes while the card still looks flipped.
function advanceCard(next) {
  flipCard.classList.remove('is-flipped');
  cardActions.classList.remove('visible');
  setTimeout(next, 400); // matches the CSS flip transition duration
}

document.getElementById('restart-lesson-btn').addEventListener('click', () => selectLesson(selectedLesson));

// ---------------------------------------------------------------------------
// Live status (drives the shared Progress tab) + session/badge tracking
// ---------------------------------------------------------------------------
async function updateLiveStatus(status, wordId) {
  if (!currentUser) return;
  const word = wordId ? wordsById.get(wordId) : null;
  await supabase.from('live_status').upsert({
    user_id: currentUser.id,
    status,
    current_word_id: wordId || null,
    current_lesson: word ? word.lesson : (status === 'studying' ? selectedLesson : null),
    session_id: sessionId,
    session_started_at: sessionStartedAt,
    earned_badge: badgeEarnedThisSession,
    updated_at: new Date().toISOString()
  }, { onConflict: 'user_id' });
}

function startHeartbeat() {
  if (heartbeatTimer) clearInterval(heartbeatTimer);
  heartbeatTimer = setInterval(async () => {
    if (!sessionId) return;
    const minutes = (Date.now() - new Date(sessionStartedAt).getTime()) / 60000;
    if (minutes >= BADGE_MINUTES && !badgeEarnedThisSession) {
      badgeEarnedThisSession = true;
    }
    await supabase.from('study_sessions')
      .update({ total_minutes: Math.round(minutes * 10) / 10, earned_badge: badgeEarnedThisSession })
      .eq('id', sessionId);
    // Bump updated_at (and persist the badge flag) so the row stays "active".
    const currentTab = document.querySelector('.tab-btn.active').dataset.tab;
    await updateLiveStatus(currentTab === 'study' ? 'studying' : 'idle', currentWordId);
  }, HEARTBEAT_MS);
}

async function startSession() {
  const { data, error } = await supabase
    .from('study_sessions')
    .insert({ user_id: currentUser.id, started_at: new Date().toISOString() })
    .select()
    .single();
  if (error) { console.error(error); return; }
  sessionId = data.id;
  sessionStartedAt = data.started_at;
  badgeEarnedThisSession = false;
  await updateLiveStatus('idle', null);
}

async function endSession() {
  if (heartbeatTimer) clearInterval(heartbeatTimer);
  if (sessionId) {
    await supabase.from('study_sessions')
      .update({ ended_at: new Date().toISOString() })
      .eq('id', sessionId);
  }
  await updateLiveStatus('idle', null);
  sessionId = null;
}

// ---------------------------------------------------------------------------
// Progress tab (realtime)
// ---------------------------------------------------------------------------
function subscribeToProgress() {
  if (progressChannel) supabase.removeChannel(progressChannel);
  progressChannel = supabase
    .channel('live_status_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'live_status' }, () => refreshProgress())
    .subscribe();
}

async function refreshProgress() {
  const { data, error } = await supabase
    .from('live_status')
    .select('user_id, status, current_lesson, current_word_id, session_started_at, earned_badge, updated_at, profiles(display_name)');
  if (error) { console.error(error); return; }

  const now = Date.now();
  progressRows = (data || []).filter(r => now - new Date(r.updated_at).getTime() < STALE_MS);
  renderProgress();
}

function renderProgress() {
  const wrap = document.getElementById('progress-list');
  if (progressRows.length === 0) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="glyph">☾</div>
        <div>No one's studying right now.</div>
      </div>`;
    return;
  }

  wrap.innerHTML = '';
  progressRows.forEach(row => {
    const name = row.profiles?.display_name || 'Someone';
    const word = row.current_word_id ? wordsById.get(row.current_word_id) : null;
    const statusText = row.status === 'studying'
      ? `Studying: ${row.current_lesson || ''}${word ? ' — ' + word.arabic_word : ''}`
      : 'Idle';

    const el = document.createElement('div');
    el.className = 'progress-row';
    el.innerHTML = `
      <div class="who">
        <div>
          <div class="name">${escapeHtml(name)} ${row.earned_badge ? '<span class="badge">🏅</span>' : ''}</div>
          <div class="status ${row.status === 'studying' ? 'studying' : ''}">${escapeHtml(statusText)}</div>
        </div>
      </div>
      <div class="elapsed" data-started="${row.session_started_at || ''}"></div>
    `;
    wrap.appendChild(el);
  });
  tickElapsedTimes();
}

function tickElapsedTimes() {
  document.querySelectorAll('.elapsed').forEach(el => {
    const started = el.dataset.started;
    if (!started) { el.textContent = ''; return; }
    const secs = Math.max(0, Math.floor((Date.now() - new Date(started).getTime()) / 1000));
    const m = Math.floor(secs / 60), s = secs % 60;
    el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  });
}
if (elapsedTickTimer) clearInterval(elapsedTickTimer);
elapsedTickTimer = setInterval(tickElapsedTimes, 1000);

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
