<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یادگیری لغات عربی</title>
    
    <!-- Fonts -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Vazirmatn', 'sans-serif'],
                        arabic: ['Amiri', 'serif'],
                    },
                    colors: {
                        // Light Mode (Desert/Cream)
                        desert: { bg: '#fbf8f1', card: '#f4ebd0', text: '#5c4033', primary: '#b8860b' },
                        // Dark Mode (Dark Blue/Gold)
                        night: { bg: '#0f172a', card: '#1e293b', text: '#fcd34d', primary: '#fbbf24' }
                    }
                }
            }
        }
    </script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        
        /* Flip Card CSS */
        .flip-card {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }
    </style>
</head>
<body class="bg-desert-bg text-desert-text dark:bg-night-bg dark:text-night-text min-h-screen antialiased">

    <!-- Theme Toggle -->
    <button onclick="toggleTheme()" class="fixed top-4 left-4 p-3 rounded-full bg-desert-card dark:bg-night-card shadow-lg z-50 transition">
        <span id="theme-icon" class="text-xl">🌙</span>
    </button>

    <!-- Auth Section -->
    <div id="auth-section" class="flex items-center justify-center min-h-screen">
        <div class="bg-desert-card dark:bg-night-card p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h1 class="text-3xl font-bold text-center mb-6 text-desert-primary dark:text-night-primary">ورود / ثبت‌نام</h1>
            <input type="email" id="email" placeholder="ایمیل" class="w-full p-3 mb-4 rounded-lg bg-white dark:bg-slate-800 border-none outline-none dark:text-white" dir="ltr">
            <input type="password" id="password" placeholder="رمز عبور" class="w-full p-3 mb-6 rounded-lg bg-white dark:bg-slate-800 border-none outline-none dark:text-white" dir="ltr">
            <div class="flex gap-4">
                <button onclick="login()" class="flex-1 bg-desert-primary dark:bg-night-primary text-white dark:text-slate-900 font-bold py-3 rounded-lg hover:opacity-90">ورود</button>
                <button onclick="signup()" class="flex-1 bg-gray-300 dark:bg-slate-700 text-gray-800 dark:text-white font-bold py-3 rounded-lg hover:opacity-90">ثبت‌نام</button>
            </div>
            <p id="auth-msg" class="text-sm mt-4 text-center text-red-500"></p>
        </div>
    </div>

    <!-- Main App Section (Hidden by default) -->
    <div id="main-app" class="hidden max-w-4xl mx-auto p-4 pt-16">
        
        <!-- Header & User Info -->
        <div class="flex justify-between items-center mb-8 bg-desert-card dark:bg-night-card p-4 rounded-xl shadow-md">
            <div>
                <h2 class="text-xl font-bold">سلام، <span id="user-display-name">کاربر</span> <span id="my-badge" class="hidden">🏆</span></h2>
                <p class="text-sm opacity-80 mt-1">زمان مطالعه: <span id="session-timer">00:00</span></p>
            </div>
            <button onclick="logout()" class="text-sm bg-red-500 text-white px-4 py-2 rounded-lg">خروج</button>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 mb-6">
            <button onclick="switchTab('study')" id="tab-study" class="flex-1 py-3 text-center rounded-lg bg-desert-primary dark:bg-night-primary text-white dark:text-slate-900 font-bold transition">مطالعه لغات</button>
            <button onclick="switchTab('progress')" id="tab-progress" class="flex-1 py-3 text-center rounded-lg bg-desert-card dark:bg-night-card opacity-70 hover:opacity-100 transition font-bold">وضعیت زنده (Progress)</button>
        </div>

        <!-- Tab 1: Study -->
        <div id="view-study">
            <div class="mb-6 flex gap-2 overflow-x-auto pb-2" id="lesson-selector">
                <!-- Lessons will be injected here -->
            </div>

            <!-- Flashcard Area -->
            <div id="flashcard-container" class="hidden">
                <div class="text-center mb-4">
                    <span class="text-sm opacity-80">کلمات باقی‌مانده: <span id="words-left" class="font-bold">0</span></span>
                </div>

                <div class="flip-card" id="flashcard" onclick="toggleCard()">
                    <div class="flip-card-inner bg-desert-card dark:bg-night-card" id="flashcard-inner">
                        <!-- Front -->
                        <div class="flip-card-front flex-col">
                            <p class="text-sm opacity-70 mb-4" id="card-lesson-name">درس</p>
                            <h2 class="text-6xl font-arabic text-desert-primary dark:text-night-primary" id="card-arabic">...</h2>
                            <p class="text-sm opacity-50 mt-6">(برای مشاهده معنی کلیک کنید)</p>
                        </div>
                        <!-- Back -->
                        <div class="flip-card-back flex-col">
                            <h3 class="text-4xl font-bold text-green-700 dark:text-green-400" id="card-persian">...</h3>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex gap-4 mt-8 opacity-0 pointer-events-none transition-opacity duration-300" id="action-buttons">
                    <button onclick="handleAnswer(false, event)" class="flex-1 bg-red-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-red-600">نیاز به تکرار ❌</button>
                    <button onclick="handleAnswer(true, event)" class="flex-1 bg-green-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-600">یاد گرفتم ✅</button>
                </div>
            </div>

            <div id="study-complete" class="hidden text-center bg-desert-card dark:bg-night-card p-10 rounded-2xl shadow-md mt-4">
                <h2 class="text-3xl font-bold mb-4 text-green-600">آفرین! 🎉</h2>
                <p>تمام کلمات این درس را یاد گرفتی.</p>
                <button onclick="document.getElementById('lesson-selector').scrollIntoView()" class="mt-6 bg-desert-primary dark:bg-night-primary text-white dark:text-slate-900 px-6 py-2 rounded-lg font-bold">انتخاب درس دیگر</button>
            </div>
        </div>

        <!-- Tab 2: Progress (Live) -->
        <div id="view-progress" class="hidden">
            <div class="bg-desert-card dark:bg-night-card p-6 rounded-2xl shadow-md">
                <h2 class="text-2xl font-bold mb-6 text-desert-primary dark:text-night-primary">کاربران در حال مطالعه (زنده)</h2>
                <div id="live-users-list" class="space-y-4">
                    <p class="text-center opacity-70">در حال دریافت اطلاعات...</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Application Logic -->
    <script>
        // ---------------------------------------------------
        // 1. تنظیمات اولیه و متغیرها
        // ---------------------------------------------------
        const SUPABASE_URL = 'YOUR_SUPABASE_URL'; // اینجا آدرس سوپابیس را وارد کنید
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY'; // اینجا کلید سوپابیس را وارد کنید
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let studySessionId = null;
        let sessionStartTime = null;
        let timerInterval = null;
        let sessionMinutes = 0;
        let earnedBadge = false;

        let wordsQueue = [];
        let currentLesson = '';
        let isFlipped = false;
        
        let correctCount = 0;
        let incorrectCount = 0;

        // ---------------------------------------------------
        // 2. مدیریت تم (تاریک/روشن)
        // ---------------------------------------------------
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }
        // تنظیم تم پیش‌فرض بر اساس سیستم
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').innerText = '☀️';
        }

        // ---------------------------------------------------
        // 3. احراز هویت (Auth) و پاکسازی دیتای قدیمی
        // ---------------------------------------------------
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                initApp();
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) showMsg(error.message);
            else { currentUser = data.user; initApp(); }
        }

        async function signup() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) showMsg(error.message);
            else {
                showMsg('ثبت نام موفق! پروفایل در حال ساخت...', false);
                // ساخت پروفایل اولیه
                await supabase.from('profiles').insert([{ id: data.user.id, display_name: email.split('@')[0] }]);
                currentUser = data.user;
                initApp();
            }
        }

        function showMsg(text, isError = true) {
            const el = document.getElementById('auth-msg');
            el.innerText = text;
            el.className = `text-sm mt-4 text-center ${isError ? 'text-red-500' : 'text-green-500'}`;
        }

        async function logout() {
            if(studySessionId) await stopSession();
            await supabase.auth.signOut();
            window.location.reload();
        }

        async function cleanupOldData() {
            // حذف سشن‌های قدیمی‌تر از ۷ روز برای این کاربر
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            await supabase.from('study_sessions')
                .delete()
                .eq('user_id', currentUser.id)
                .lt('started_at', sevenDaysAgo.toISOString());
        }

        // ---------------------------------------------------
        // 4. راه‌اندازی اپلیکیشن و نشست
        // ---------------------------------------------------
        async function initApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            // دریافت نام نمایشی
            const { data: profile } = await supabase.from('profiles').select('display_name').eq('id', currentUser.id).single();
            document.getElementById('user-display-name').innerText = profile ? profile.display_name : currentUser.email.split('@')[0];

            await cleanupOldData();
            await startNewSession();
            loadLessons();
            subscribeToLiveStatus();
        }

        async function startNewSession() {
            sessionStartTime = Date.now();
            const { data, error } = await supabase.from('study_sessions').insert([{ user_id: currentUser.id }]).select().single();
            if(data) studySessionId = data.id;

            // Timer (Update every 30s to DB, update UI every second)
            timerInterval = setInterval(() => {
                const diffMs = Date.now() - sessionStartTime;
                sessionMinutes = Math.floor(diffMs / 60000);
                const seconds = Math.floor((diffMs % 60000) / 1000);
                
                document.getElementById('session-timer').innerText = 
                    `${String(sessionMinutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

                // چک کردن گرفتن بج (۲۰ دقیقه)
                if(sessionMinutes >= 20 && !earnedBadge) {
                    earnedBadge = true;
                    document.getElementById('my-badge').classList.remove('hidden');
                }

                // سینک وضعیت زنده هر ۱۵ ثانیه
                if(seconds % 15 === 0) updateLiveStatusDB();
            }, 1000);
            
            updateLiveStatusDB();
        }

        async function stopSession() {
            clearInterval(timerInterval);
            await supabase.from('study_sessions').update({ total_minutes: sessionMinutes, earned_badge: earnedBadge }).eq('id', studySessionId);
            await supabase.from('live_status').update({ status: 'offline' }).eq('user_id', currentUser.id);
        }

        async function updateLiveStatusDB() {
            const currentWordId = wordsQueue.length > 0 ? wordsQueue[0].id : null;
            await supabase.from('live_status').upsert({
                user_id: currentUser.id,
                status: 'studying',
                current_lesson: currentLesson || 'در حال انتخاب',
                current_word_id: currentWordId,
                session_started_at: new Date(sessionStartTime).toISOString(),
                correct_count: correctCount,
                incorrect_count: incorrectCount,
                earned_badge: earnedBadge,
                updated_at: new Date().toISOString()
            });
        }

        // ---------------------------------------------------
        // 5. منطق فلش‌کارت
        // ---------------------------------------------------
        async function loadLessons() {
            const lessons = ['درس اول', 'درس دوم', 'درس سوم', 'درس چهارم', 'درس پنجم', 'درس ششم', 'درس هفتم'];
            const container = document.getElementById('lesson-selector');
            container.innerHTML = '';
            
            lessons.forEach(l => {
                const btn = document.createElement('button');
                btn.className = 'whitespace-nowrap px-4 py-2 rounded-lg bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 hover:bg-desert-primary hover:text-white dark:hover:bg-night-primary transition font-bold';
                btn.innerText = l;
                btn.onclick = () => selectLesson(l, btn);
                container.appendChild(btn);
            });
        }

        async function selectLesson(lessonName, btnElement) {
            // آپدیت UI دکمه‌ها
            document.querySelectorAll('#lesson-selector button').forEach(b => {
                b.classList.remove('bg-desert-primary', 'text-white', 'dark:bg-night-primary', 'dark:text-slate-900');
            });
            btnElement.classList.add('bg-desert-primary', 'text-white', 'dark:bg-night-primary', 'dark:text-slate-900');

            currentLesson = lessonName;
            document.getElementById('study-complete').classList.add('hidden');
            
            // دریافت کلمات از دیتابیس
            const { data } = await supabase.from('words').select('*').eq('lesson', lessonName);
            if(data && data.length > 0) {
                // مخلوط کردن کلمات (Shuffle)
                wordsQueue = data.sort(() => Math.random() - 0.5);
                document.getElementById('flashcard-container').classList.remove('hidden');
                
                // ریست کردن کارت
                if(isFlipped) forceFlipBackSync();
                
                renderCurrentWord();
                updateLiveStatusDB();
            }
        }

        function renderCurrentWord() {
            const leftCount = wordsQueue.length;
            document.getElementById('words-left').innerText = leftCount;

            if(leftCount === 0) {
                document.getElementById('flashcard-container').classList.add('hidden');
                document.getElementById('study-complete').classList.remove('hidden');
                return;
            }

            const word = wordsQueue[0];
            document.getElementById('card-lesson-name').innerText = currentLesson;
            document.getElementById('card-arabic').innerText = word.arabic_word;
            document.getElementById('card-persian').innerText = word.persian_meaning;
        }

        function toggleCard() {
            const card = document.getElementById('flashcard');
            const btns = document.getElementById('action-buttons');
            
            isFlipped = !isFlipped;
            
            if(isFlipped) {
                card.classList.add('flipped');
                btns.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                card.classList.remove('flipped');
                btns.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        function forceFlipBackSync() {
            const card = document.getElementById('flashcard');
            const btns = document.getElementById('action-buttons');
            isFlipped = false;
            card.classList.remove('flipped');
            btns.classList.add('opacity-0', 'pointer-events-none');
        }

        function handleAnswer(isCorrect, event) {
            event.stopPropagation(); // جلوگیری از اجرای toggleCard
            if(!isFlipped) return;

            // 1. کارت را برگردان
            forceFlipBackSync();

            // 2. صبر کن تا انیمیشن چرخش (500ms) تمام شود، سپس دیتای کارت بعدی را لود کن
            // این کار از لو رفتن جواب کارت بعدی جلوگیری میکند
            setTimeout(() => {
                const currentWord = wordsQueue.shift(); // کلمه فعلی را از صف بردار

                if(isCorrect) {
                    correctCount++;
                    // چون یاد گرفته، دیگه به صف اضافه نمیشه
                } else {
                    incorrectCount++;
                    // دوباره میره ته صف
                    wordsQueue.push(currentWord);
                }

                renderCurrentWord();
                updateLiveStatusDB();
            }, 500); 
        }


        // ---------------------------------------------------
        // 6. وضعیت زنده (Progress Realtime)
        // ---------------------------------------------------
        function switchTab(tab) {
            const vStudy = document.getElementById('view-study');
            const vProg = document.getElementById('view-progress');
            const tStudy = document.getElementById('tab-study');
            const tProg = document.getElementById('tab-progress');

            if(tab === 'study') {
                vStudy.classList.remove('hidden');
                vProg.classList.add('hidden');
                
                tStudy.classList.replace('bg-desert-card', 'bg-desert-primary');
                tStudy.classList.replace('dark:bg-night-card', 'dark:bg-night-primary');
                tStudy.classList.replace('opacity-70', 'opacity-100');
                tStudy.classList.add('text-white', 'dark:text-slate-900');
                
                tProg.classList.replace('bg-desert-primary', 'bg-desert-card');
                tProg.classList.replace('dark:bg-night-primary', 'dark:bg-night-card');
                tProg.classList.remove('text-white', 'dark:text-slate-900');
                tProg.classList.replace('opacity-100', 'opacity-70');
            } else {
                vStudy.classList.add('hidden');
                vProg.classList.remove('hidden');
                
                tProg.classList.replace('bg-desert-card', 'bg-desert-primary');
                tProg.classList.replace('dark:bg-night-card', 'dark:bg-night-primary');
                tProg.classList.replace('opacity-70', 'opacity-100');
                tProg.classList.add('text-white', 'dark:text-slate-900');
                
                tStudy.classList.replace('bg-desert-primary', 'bg-desert-card');
                tStudy.classList.replace('dark:bg-night-primary', 'dark:bg-night-card');
                tStudy.classList.remove('text-white', 'dark:text-slate-900');
                tStudy.classList.replace('opacity-100', 'opacity-70');
                
                fetchAndRenderLiveUsers();
            }
        }

        async function fetchAndRenderLiveUsers() {
            // گرفتن 5 کاربر فعال
            const { data, error } = await supabase
                .from('live_status')
                .select(`
                    *,
                    profiles ( display_name )
                `)
                .eq('status', 'studying')
                .order('updated_at', { ascending: false })
                .limit(5);

            const container = document.getElementById('live-users-list');
            container.innerHTML = '';

            if(!data || data.length === 0) {
                container.innerHTML = '<p class="text-center opacity-70">هیچ کاربری در حال مطالعه نیست.</p>';
                return;
            }

            data.forEach(userStatus => {
                const isMe = userStatus.user_id === currentUser.id;
                const name = userStatus.profiles?.display_name || 'کاربر ناشناس';
                
                // محاسبه زمان
                const start = new Date(userStatus.session_started_at).getTime();
                const diffMins = Math.floor((Date.now() - start) / 60000);
                
                // محاسبه درصد پیشرفت (فرضی بر اساس تعداد صحیح/غلط)
                const totalAnswers = userStatus.correct_count + userStatus.incorrect_count;
                let accuracy = 0;
                if(totalAnswers > 0) accuracy = Math.round((userStatus.correct_count / totalAnswers) * 100);

                const el = document.createElement('div');
                el.className = `p-4 rounded-xl border ${isMe ? 'border-green-500 bg-green-50 dark:bg-green-900/20' : 'border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800'}`;
                
                el.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold text-lg">${name} ${isMe ? '(شما)' : ''} ${userStatus.earned_badge ? '🏆' : ''}</h3>
                        <span class="text-xs bg-desert-primary text-white px-2 py-1 rounded-full">${diffMins} دقیقه</span>
                    </div>
                    <p class="text-sm opacity-80 mb-2">در حال مطالعه: <strong>${userStatus.current_lesson}</strong></p>
                    <div class="w-full bg-gray-200 dark:bg-slate-700 rounded-full h-2.5 mb-1 relative overflow-hidden">
                        <div class="bg-green-500 h-2.5 rounded-full transition-all duration-500" style="width: ${accuracy}%"></div>
                    </div>
                    <div class="flex justify-between text-xs opacity-70">
                        <span>دقت: ${accuracy}%</span>
                        <span>✅ ${userStatus.correct_count} | ❌ ${userStatus.incorrect_count}</span>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        function subscribeToLiveStatus() {
            // عضویت در کانال تغییرات جدول live_status
            supabase.channel('public:live_status')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'live_status' }, payload => {
                    // اگر کاربر در تب پروگرس بود، لیست را آپدیت کن
                    if(!document.getElementById('view-progress').classList.contains('hidden')){
                        fetchAndRenderLiveUsers();
                    }
                })
                .subscribe();
        }

        // On load
        checkSession();

        // جلوگیری از بستن صفحه در حین مطالعه بدون توقف سشن
        window.addEventListener('beforeunload', () => {
            if(studySessionId) {
                // ارسال یک درخواست همزمان قبل از بسته شدن تب ممکن است با مشکل مواجه شود
                // اما برای اطمینان این متد آپدیت نهایی را میفرستد
                supabase.from('live_status').update({ status: 'offline' }).eq('user_id', currentUser.id).then();
            }
        });
    </script>
</body>
</html>
